name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (must match esphome.project.version in common/koala-base.yaml)"
        required: true

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  PUBLISH_URL: https://formatbce.github.io/Koala-Satellite
  FACTORY_YAML: config/koala-satellite.yaml

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Sanity check version matches YAML
        run: |
          YAML_VER=$(grep -E '^\s*version:' config/common/koala-base.yaml \
                     | head -n1 \
                     | sed -E 's/.*version:\s*"?([^"]+)"?\s*/\1/')
          echo "YAML version: $YAML_VER"
          echo "Input version: ${{ inputs.version }}"
          if [ "$YAML_VER" != "${{ inputs.version }}" ]; then
            echo "::error::Version mismatch — bump esphome.project.version in common/koala-base.yaml first"
            exit 1
          fi

      - name: Run ewt-gen
        run: |
          uvx ewt-gen "$FACTORY_YAML" \
            --output dist \
            --publish-url "$PUBLISH_URL" \
            --fw-version "${{ inputs.version }}"
          echo "=== dist/ after ewt-gen ==="
          ls -la dist/

      - name: Augment with OTA bin + ota block in manifest
        run: |
          V="${{ inputs.version }}"

          # ESPHome's build dropped both firmware.factory.bin and firmware.ota.bin here:
          OTA_BIN=$(find config/.esphome/build -name 'firmware.ota.bin' | head -n1)
          test -n "$OTA_BIN" || { echo "::error::firmware.ota.bin not found"; exit 1; }
          echo "Found OTA bin: $OTA_BIN"

          OTA_NAME="koala-${V}.ota.bin"
          cp "$OTA_BIN" "dist/$OTA_NAME"
          MD5=$(md5sum "dist/$OTA_NAME" | awk '{print $1}')

          # Patch ewt-gen's manifest.json to add the ota block alongside parts.
          # ESP Web Tools reads parts (for install); update.http_request reads ota (for polling).
          python - <<PY
          import json
          with open("dist/manifest.json") as f: m = json.load(f)
          m["builds"][0]["ota"] = {
              "md5": "$MD5",
              "path": "$OTA_NAME",
              "release_url": "https://github.com/formatBCE/Koala-Satellite/releases/tag/$V",
              "summary": "Koala Satellite $V"
          }
          with open("dist/manifest.json", "w") as f:
              json.dump(m, f, indent=2)
          PY

          echo "=== augmented manifest.json ==="
          cat dist/manifest.json
          echo "=== final dist/ contents ==="
          ls -la dist/

      - uses: actions/upload-artifact@v4
        with:
          name: site
          path: dist/

  publish-pages:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: site
          path: dist/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/
      - id: deploy
        uses: actions/deploy-pages@v4

  mirror-ota-and-release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: site
          path: dist/

      - name: Refresh ota/ (latest only)
        run: |
          rm -rf ota
          mkdir -p ota
          cp dist/manifest.json ota/
          cp dist/*.ota.bin ota/
          echo "=== ota/ contents ==="
          ls -la ota/

      - name: Commit ota/
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ota/
          git commit -m "OTA: ${{ inputs.version }}" || echo "no changes"
          git push

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: ${{ inputs.version }}
          generate_release_notes: true
          files: |
            dist/firmware-*.bin
            dist/*.ota.bin
