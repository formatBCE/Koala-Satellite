name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (must match esphome.project.version in common/koala-base.yaml)"
        required: true

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  PUBLISH_URL: https://formatbce.github.io/Koala-Satellite
  FACTORY_YAML: config/koala-dashboard.yaml

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Sanity check version matches YAML
        run: |
          YAML_VER=$(grep -E '^\s*version:' config/common/koala-base.yaml | head -n1 | sed -E 's/.*version:\s*"?([^"]+)"?\s*/\1/')
          echo "YAML version: $YAML_VER"
          echo "Input version: ${{ inputs.version }}"
          if [ "$YAML_VER" != "${{ inputs.version }}" ]; then
            echo "::error::Version mismatch — bump esphome.project.version in common/koala-base.yaml first"
            exit 1
          fi

      - name: Run ewt-gen
        run: |
          uvx ewt-gen "$FACTORY_YAML" \
            --output dist \
            --publish-url "$PUBLISH_URL" \
            --fw-version "${{ inputs.version }}"
          ls -la dist/

      - uses: actions/upload-artifact@v4
        with:
          name: site
          path: dist/

  publish-pages:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: site
          path: dist/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/
      - id: deploy
        uses: actions/deploy-pages@v4

  mirror-ota-and-release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: site
          path: dist/

      - name: Refresh ota/ (latest only)
        run: |
          rm -rf ota
          mkdir -p ota
          SUBDIR=$(find dist -mindepth 1 -maxdepth 1 -type d | head -n1)
          echo "ewt-gen output is in: $SUBDIR"
          ls -la "$SUBDIR"
          cp "$SUBDIR"/manifest.json ota/
          cp "$SUBDIR"/*.ota.bin ota/ 2>/dev/null || true
          ls -la ota/

      - name: Commit ota/
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ota/
          git commit -m "OTA: ${{ inputs.version }}" || echo "no changes"
          git push

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: ${{ inputs.version }}
          generate_release_notes: true
          files: |
            dist/**/*.factory.bin
            dist/**/*.ota.bin
